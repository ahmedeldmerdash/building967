<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إتحاد ملاك عمارة 967</title>
    <style>
        :root { --primary-color: #1a73e8; --secondary-color: #34a853; --bg-color: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; color: #3c4043; }
        .container { max-width: 900px; margin: auto; background: #fff; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        h1 { text-align: center; color: var(--primary-color); font-size: 22px; margin-bottom: 5px; }
        p.subtitle { text-align: center; color: #70757a; margin-bottom: 25px; font-size: 14px; }
        
        /* تصميم الأزرار والتبويبات */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #ddd; padding-bottom: 10px; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: #eee; cursor: pointer; border-radius: 8px; font-weight: bold; transition: 0.3s; }
        .tab-btn.active { background: var(--primary-color); color: white; }

        .form-section, .data-section { display: none; }
        .active-section { display: block; }

        /* تصميم النموذج */
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #dadce0; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        button#submitBtn { width: 100%; padding: 15px; background-color: var(--primary-color); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button#submitBtn:hover { background-color: #1557b0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        /* تصميم عرض الجدول */
        .iframe-container { position: relative; width: 100%; overflow: hidden; padding-top: 56.25%; /* 16:9 Aspect Ratio */ border: 1px solid #ddd; border-radius: 8px; }
        .iframe-container iframe { position: absolute; top: 0; left: 0; bottom: 0; right: 0; width: 100%; height: 100%; border: none; }
        .refresh-notice { font-size: 12px; color: #d93025; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>صفحة إتحاد الملاك - عمارة 967</h1>
    <p class="subtitle">قطاع أ - مشروع غرب المطار</p>

    <div class="tabs">
        <button class="tab-btn active" onclick="showSection('form')">📝 تسجيل بياناتي</button>
        <button class="tab-btn" onclick="showSection('data')">📊 عرض بيانات السكان</button>
    </div>

    <div id="formSection" class="form-section active-section">
        <form id="ownerForm">
            <div class="grid">
                <div class="form-group">
                    <label>رقم الشقة</label>
                    <select name="apartment_number" required id="apt_num">
                        <option value="">اختر...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>رقم الدور</label>
                    <input type="text" name="floor_number" placeholder="مثال: الأرضي" required>
                </div>
            </div>
            <div class="form-group">
                <label>إسم المالك</label>
                <input type="text" name="owner_name" placeholder="الاسم الكامل" required>
            </div>
            <div class="form-group">
                <label>اللقب أو الكنية</label>
                <input type="text" name="nickname" placeholder="اللقب العائلي">
            </div>
            <div class="grid">
                <div class="form-group">
                    <label>رقم هاتف 1</label>
                    <input type="tel" name="phone1" placeholder="01xxxxxxxxx" required>
                </div>
                <div class="form-group">
                    <label>رقم هاتف 2</label>
                    <input type="tel" name="phone2" placeholder="اختياري">
                </div>
            </div>
            <div class="form-group">
                <label>أنشطة وملاحظات</label>
                <textarea name="notes" rows="2"></textarea>
            </div>
            <button type="submit" id="submitBtn">حفظ البيانات</button>
        </form>
    </div>

    <div id="dataSection" class="data-section">
        <div class="iframe-container">
            <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vSN62d1fPHGhXQmQGmFUIan5vSHeGjw9vZNK5EgLLIUCx_i2wupfmW_uyPCJhvKZ9oIh9AUS18syBxo/pubhtml"></iframe>
        </div>
        <p class="refresh-notice">* ملاحظة: قد يستغرق ظهور البيانات الجديدة في الجدول حوالي 5 دقائق بعد الحفظ (تحديث من جوجل).</p>
        <button onclick="location.reload()" style="background:none; border:none; color:var(--primary-color); text-decoration:underline; cursor:pointer; width:100%; margin-top:10px;">تحديث الصفحة الآن</button>
    </div>
</div>

<script>
    // 1. توليد أرقام الشقق
    const select = document.getElementById('apt_num');
    for(let i=1; i<=24; i++) {
        let opt = document.createElement('option');
        opt.value = i; opt.innerHTML = 'شقة ' + i;
        select.appendChild(opt);
    }

    // 2. التنقل بين الأقسام
    function showSection(type) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.form-section, .data-section').forEach(sec => sec.classList.remove('active-section'));
        
        if(type === 'form') {
            document.getElementById('formSection').classList.add('active-section');
            document.querySelectorAll('.tab-btn')[0].classList.add('active');
        } else {
            document.getElementById('dataSection').classList.add('active-section');
            document.querySelectorAll('.tab-btn')[1].classList.add('active');
        }
    }

    // 3. الربط مع Google Script لإرسال البيانات
    // ضع رابط الـ Web App URL الذي حصلت عليه في الخطوات الأولى هنا
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyaWX_uU8y6D-9E-f3pymfJKik7bZpSRWgc5ikTbkHaejrq0NA0Tdr7qnyB1axZfxu93A/exec';
    const form = document.getElementById('ownerForm');
    const btn = document.getElementById('submitBtn');

    form.addEventListener('submit', e => {
        e.preventDefault();
        btn.disabled = true;
        btn.innerText = "جاري الحفظ...";

        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                alert("تم الحفظ بنجاح! انتقل لتبويب 'عرض البيانات' لمشاهدتها.");
                btn.disabled = false;
                btn.innerText = "حفظ البيانات";
                form.reset();
            })
            .catch(error => {
                alert("حدث خطأ في الاتصال.");
                btn.disabled = false;
                btn.innerText = "حفظ البيانات";
            });
    });
</script>

</body>
</html>
